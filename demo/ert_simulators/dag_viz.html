
<!DOCTYPE html>
<html>
<head>
    <title>KHEPRA PROTOCOL // Living Trust Constellation</title>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; margin: 0; }
        #canvas { width: 100vw; height: 100vh; }
        .node { fill: #000; stroke: #00ff41; stroke-width: 1.5px; }
        .node.secure { fill: #00ff41; stroke: #004400; }
        .link { stroke: #004400; stroke-opacity: 0.8; stroke-width: 1px; }
        .text { font-size: 10px; fill: #00ff41; opacity: 0.7; }
        #overlay { position: absolute; top: 20px; left: 20px; z-index: 10; padding: 20px; background: rgba(0,20,0,0.9); border: 1px solid #00ff41; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); max-width: 300px; }
        h3 { margin-top: 0; letter-spacing: 2px; border-bottom: 1px solid #00ff41; padding-bottom: 5px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div id="overlay">
        <h3>LIVING TRUST DAG</h3>
        <div class="stat-row"><span>STATUS:</span> <span id="status" class="blink" style="color:#00ff41">SYNCING_NETWORK</span></div>
        <div class="stat-row"><span>NODES_ACTIVE:</span> <span id="node-count">0</span></div>
        <div class="stat-row"><span>EDGES_VERIFIED:</span> <span id="edge-count">0</span></div>
        <div class="stat-row"><span>HASH_POWER:</span> <span id="hash-power">0 TH/s</span></div>
        <br/>
        <div style="font-size: 0.8em; color: #88ff88;">
            > INITIATING PQC HANDSHAKE...<br/>
            > VERIFYING GENESIS BLOCK...<br/>
            > KYBER-1024 ENCAPSULATION: OK
        </div>
    </div>
    <svg id="canvas"></svg>

    <script>
        const width = window.innerWidth;
        const height = window.innerHeight;
        
        const svg = d3.select("#canvas")
            .attr("width", width)
            .attr("height", height);

        let nodes = [];
        let links = [];

        const simulation = d3.forceSimulation(nodes)
            .force("charge", d3.forceManyBody().strength(-30))
            .force("link", d3.forceLink(links).distance(30).strength(0.5))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("y", d3.forceY(0).strength(0.01))
            .force("x", d3.forceX(0).strength(0.01))
            .on("tick", ticked);

        const g = svg.append("g");
        let link = g.append("g").attr("class", "links").selectAll(".link");
        let node = g.append("g").attr("class", "nodes").selectAll(".node");

        function ticked() {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node
                .attr("cx", d => d.x)
                .attr("cy", d => d.y);
        }

        function restart() {
            // Apply updates
            node = node.data(nodes);
            node.exit().remove();
            const nodeEnter = node.enter().append("circle")
                .attr("class", "node")
                .attr("r", 0)
                .call(drag(simulation));
            
            nodeEnter.transition().duration(500).attr("r", 4);
            
            node = nodeEnter.merge(node);

            link = link.data(links);
            link.exit().remove();
            link = link.enter().append("line")
                .attr("class", "link")
                .merge(link);

            simulation.nodes(nodes);
            simulation.force("link").links(links);
            simulation.alpha(1).restart();
            
            // Update HUD
            document.getElementById("node-count").innerText = nodes.length;
            document.getElementById("edge-count").innerText = links.length;
            document.getElementById("hash-power").innerText = (nodes.length * 12.5).toFixed(1) + " TH/s";
        }

        // Simulation Logic
        let idCounter = 0;
        
        function addNode() {
            const id = idCounter++;
            const newNode = { id: id, x: width/2 + (Math.random()-0.5)*50, y: height/2 + (Math.random()-0.5)*50 };
            nodes.push(newNode);
            
            // Connect to 1-3 random previous nodes (DAG structure) to form the weave
            if (nodes.length > 1) {
                const parentCount = Math.min(nodes.length - 1, Math.floor(Math.random() * 3) + 1);
                // Bias towards connecting to recent nodes to simulate growth
                const recentBias = Math.max(0, nodes.length - 20);
                
                for(let i=0; i<parentCount; i++) {
                    const targetId = recentBias + Math.floor(Math.random() * (nodes.length - recentBias - 1));
                    if(nodes[targetId] && nodes[targetId] !== newNode) {
                        links.push({ source: nodes[targetId], target: newNode });
                    }
                }
            }
            
            restart();
            
            // Organic growth rate
            let delay = 100;
            if (nodes.length < 50) delay = 200;
            else if (nodes.length < 150) delay = 100;
            else delay = 50;

            if(nodes.length < 1000) {
                setTimeout(addNode, delay);
            } else {
                document.getElementById("status").innerText = "CONSTELLATION_STABLE";
                document.getElementById("status").style.color = "#ffffff";
            }
        }

        function drag(simulation) {
            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }
            
            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }
            
            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }
            
            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // Start
        setTimeout(addNode, 1000);

    </script>
</body>
</html>
