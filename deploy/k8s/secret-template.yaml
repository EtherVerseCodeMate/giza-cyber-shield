# AdinKhepra Iron Bank - License Secret Template
# DO NOT commit actual license.jwt to version control
#
# To create the secret:
#   kubectl create secret generic adinkhepra-license \
#     --from-file=license.jwt=/path/to/your/license.jwt \
#     -n adinkhepra-system
#
# For base64-encoded license:
#   kubectl create secret generic adinkhepra-license \
#     --from-literal=license.jwt="$(cat /path/to/license.jwt | base64 -w0)" \
#     -n adinkhepra-system

apiVersion: v1
kind: Secret
metadata:
  name: adinkhepra-license
  namespace: adinkhepra-system
  labels:
    app: adinkhepra
    component: licensing
type: Opaque
data:
  # Base64-encoded license JWT
  # Replace with actual license from licensing server
  license.jwt: BASE64_ENCODED_LICENSE_JWT_HERE

---

# Optional: Pull secret for Iron Bank registry
# Required if accessing registry1.dso.mil from outside Platform One
#
# To create pull secret:
#   kubectl create secret docker-registry ironbank-pull-secret \
#     --docker-server=registry1.dso.mil \
#     --docker-username=YOUR_USERNAME \
#     --docker-password=YOUR_CLI_SECRET \
#     --docker-email=YOUR_EMAIL \
#     -n adinkhepra-system
#
# Then add to StatefulSet spec.template.spec.imagePullSecrets:
#   imagePullSecrets:
#   - name: ironbank-pull-secret

apiVersion: v1
kind: Secret
metadata:
  name: ironbank-pull-secret
  namespace: adinkhepra-system
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: BASE64_ENCODED_DOCKER_CONFIG_JSON_HERE
