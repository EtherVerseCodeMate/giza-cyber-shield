# Phantom Network Stack - Docker Compose Configuration (GitLab Edition)
#
# Quick deployment for GitLab + Phantom Node + Mobile Builder
#
# Usage:
#   docker-compose -f docker-compose-gitlab.yml up -d     # Start all services
#   docker-compose -f docker-compose-gitlab.yml ps        # Check status
#   docker-compose -f docker-compose-gitlab.yml logs -f   # View logs
#   docker-compose -f docker-compose-gitlab.yml down      # Stop all services
#
# Services:
#   - gitlab: Self-hosted GitLab CE (private Git hosting)
#   - phantom-node: Phantom Network node
#   - mobile-builder: gomobile build environment
#   - postgres: Database for phantom metadata
#   - prometheus: Metrics collection
#   - grafana: Monitoring dashboard

version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════
  # GitLab CE (Self-Hosted Git)
  #
  # Complete privacy, air-gap capable, zero subpoena risk
  # ═══════════════════════════════════════════════════════════════════

  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: phantom-gitlab
    hostname: gitlab.phantom.local
    restart: always
    ports:
      - "443:443"   # HTTPS
      - "80:80"     # HTTP
      - "2222:22"   # SSH (using 2222 to avoid conflict with host SSH)
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab
    shm_size: '256m'
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab.phantom.local'
        gitlab_rails['gitlab_shell_ssh_port'] = 2222
        # Disable usage ping (privacy)
        gitlab_rails['usage_ping_enabled'] = false
        # Disable Sentry error reporting (privacy)
        gitlab_rails['sentry_enabled'] = false
        # Enable container registry (optional)
        # registry_external_url 'https://gitlab.phantom.local:5050'
    networks:
      - phantom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/-/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s  # GitLab takes ~5 minutes to start

  # ═══════════════════════════════════════════════════════════════════
  # Phantom Network Node
  #
  # Core phantom node for invisible mesh networking
  # ═══════════════════════════════════════════════════════════════════

  phantom-node:
    build:
      context: .
      dockerfile: Dockerfile.phantom
    container_name: phantom-node
    restart: always
    ports:
      - "8080:8080"   # Phantom API
      - "9090:9090"   # Metrics (Prometheus)
    volumes:
      - ./pkg:/app/pkg
      - phantom-keys:/root/.khepra/keys
      - phantom-data:/app/data
    environment:
      # Phantom configuration
      - PHANTOM_SYMBOL=Eban                    # Adinkra symbol (Eban, Fawohodie, Nkyinkyim, Dwennimmen)
      - PHANTOM_NETWORK_MODE=stealth           # Network mode: stealth, normal
      - PHANTOM_CARRIER=JPEG                   # Carrier: JPEG, HTTP, DNS, WebRTC
      - PHANTOM_ROTATION_PERIOD=5m             # Address rotation period

      # Security
      - PHANTOM_ENCRYPTION=kyber1024           # Post-quantum encryption
      - PHANTOM_SIGNING=dilithium3             # Post-quantum signatures

      # Database
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=phantom_network
      - DB_USER=phantom
      - DB_PASSWORD=phantom_secure_password_change_me  # ⚠️ CHANGE THIS

      # Counter-surveillance (optional)
      - GPS_SPOOF_ENABLED=false
      - GPS_SPOOF_TARGET=Switzerland
      - FACE_DEFEAT_ENABLED=false
      - THERMAL_MASKING_ENABLED=false
      - IMSI_ROTATION_ENABLED=false
    networks:
      - phantom-network
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════
  # Mobile Builder (gomobile)
  #
  # Builds Android (.aar) and iOS (.framework) libraries
  # ═══════════════════════════════════════════════════════════════════

  mobile-builder:
    build:
      context: .
      dockerfile: Dockerfile.mobile
    container_name: phantom-mobile-builder
    volumes:
      - ./pkg:/app/pkg
      - ./cmd:/app/cmd
      - mobile-output:/app/output
    command: ["tail", "-f", "/dev/null"]  # Keep container running
    networks:
      - phantom-network

  # ═══════════════════════════════════════════════════════════════════
  # PostgreSQL Database
  #
  # Stores phantom network metadata (encrypted)
  # ═══════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:15-alpine
    container_name: phantom-postgres
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: phantom
      POSTGRES_PASSWORD: phantom_secure_password_change_me  # ⚠️ CHANGE THIS
      POSTGRES_DB: phantom_network
    networks:
      - phantom-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phantom"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════
  # Prometheus (Metrics)
  #
  # Collects metrics from phantom-node
  # ═══════════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:latest
    container_name: phantom-prometheus
    restart: always
    ports:
      - "9091:9090"  # Using 9091 to avoid conflict with phantom metrics port
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - phantom-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════
  # Grafana (Dashboard)
  #
  # Visualizes phantom network metrics
  # ═══════════════════════════════════════════════════════════════════

  grafana:
    image: grafana/grafana:latest
    container_name: phantom-grafana
    restart: always
    ports:
      - "3001:3000"  # Using 3001 to avoid conflict with other apps
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=phantomadmin  # ⚠️ CHANGE THIS
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_AUTH_ANONYMOUS_ENABLED=false
    networks:
      - phantom-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ═══════════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════════

networks:
  phantom-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ═══════════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════════

volumes:
  # GitLab volumes
  gitlab-config:
    driver: local
  gitlab-logs:
    driver: local
  gitlab-data:
    driver: local

  # Phantom volumes
  phantom-keys:
    driver: local
  phantom-data:
    driver: local
  mobile-output:
    driver: local

  # Database volumes
  postgres-data:
    driver: local

  # Monitoring volumes
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
