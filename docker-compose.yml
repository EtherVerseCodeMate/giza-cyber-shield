# KHEPRA Protocol - Full Stack Deployment
# Run: docker-compose up -d

version: '3.8'

services:
  # SouHimBou AI - ML Anomaly Detection API
  souhimbou-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: souhimbou-ai
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - FEATURE_DIM=128
      - HIDDEN_DIM=64
      - LATENT_DIM=32
      - MODEL_PATH=/app/models/souhimbou_v1.pt
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data
      - souhimbou-logs:/var/log/souhimbou
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - khepra-net

  # Dashboard - Next.js Web Interface
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: khepra-dashboard
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://souhimbou-ai:8080
      - NEXT_PUBLIC_GATEWAY_URL=http://gateway:8443
    depends_on:
      - souhimbou-ai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - khepra-net

  # Gateway - Go API Server (optional, for enterprise features)
  gateway:
    image: golang:1.23-alpine
    container_name: khepra-gateway
    working_dir: /app
    command: ["./gateway"]
    ports:
      - "8443:8443"
    volumes:
      - ./bin/gateway:/app/gateway:ro
      - ./keys:/app/keys:ro
    environment:
      - KHEPRA_MODE=community
      - KHEPRA_HOME=/var/lib/khepra
    depends_on:
      - souhimbou-ai
    restart: unless-stopped
    networks:
      - khepra-net
    profiles:
      - enterprise

volumes:
  souhimbou-logs:
  khepra-data:

networks:
  khepra-net:
    driver: bridge
