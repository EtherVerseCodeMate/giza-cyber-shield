# Fly.io deployment configuration for SouHimBou Dashboard (Next.js Frontend)
app = "souhimbou-dashboard"
primary_region = "iad" # US East (Ashburn, VA)

[build]
  dockerfile = "Dockerfile.dashboard"
  ignorefile = ".dockerignore.dashboard"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  NEXT_PUBLIC_API_URL = "https://souhimbou-ai.fly.dev"
  AGENT_URL = "https://souhimbou-ai.fly.dev"
  NEXT_PUBLIC_SUPABASE_URL = "https://xjknkjbrjgljuovaazeu.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhqa25ramJyamdsanVvdmFhemV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU4NTMzNDksImV4cCI6MjA3MTQyOTM0OX0.ioWr3_viAbWJHAaHnBxQrzSXtgUlcAAjrPWEsoSh6sk"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 3000
    path = "/"
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
