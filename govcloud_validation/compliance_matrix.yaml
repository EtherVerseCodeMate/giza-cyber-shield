# Maps govcloud_validation check_id values to indicative framework references.
# NOT authoritative for audits — your AO / C3PAO / assessor decides control satisfaction.
# Version when you add checks or change control intent.
matrix_version: "1.2"
last_reviewed: "2026-03-24"
references:
  nist_sp_800_171_rev2: "Protecting CUI in Nonfederal Systems and Organizations"
  cmmc_model: "CMMC Model v2.0, Level 2 (selected practices)"
  nist_sp_800_53_rev5: "Optional cross-reference for SSP language (not 1:1 with checks)"

coverage_types:
  point_in_time: "State at API call time only; may change before assessor review."
  configuration: "Configuration present/enabled; effectiveness still needs human review."
  partial: "Narrow signal; substantial evidence must come from policies, procedures, and sampling."

checks:
  - id: sts_caller_identity
    stage_id: step_00_prereqs
    nist_800_171_rev2: ["3.1.1", "3.1.2", "3.5.1"]
    cmmc_level_2: ["AC.L2-3.1.1", "AC.L2-3.1.2", "IA.L2-3.5.1"]
    coverage: point_in_time
    assessor_notes: "Confirms a session exists; does not prove account issuance, MFA, or US-person attestation."

  - id: expected_govcloud_account_id
    stage_id: step_00_prereqs
    nist_800_171_rev2: ["3.1.1"]
    cmmc_level_2: ["AC.L2-3.1.1"]
    coverage: configuration
    assessor_notes: "Drift check vs expected account; scope must match SSP boundary."

  - id: iam_root_mfa_enabled
    stage_id: step_00_prereqs
    nist_800_171_rev2: ["3.5.3", "3.1.2"]
    cmmc_level_2: ["IA.L2-3.5.3", "AC.L2-3.1.2"]
    coverage: configuration
    assessor_notes: "IAM summary flag for root MFA; IDC-only shops may still use root rarely — procedure matters."

  - id: iam_root_access_keys_absent
    stage_id: step_00_prereqs
    nist_800_171_rev2: ["3.5.1", "3.1.2"]
    cmmc_level_2: ["IA.L2-3.5.1", "AC.L2-3.1.2"]
    coverage: configuration
    assessor_notes: "Counts root access keys; confirm against break-glass policy."

  - id: identity_center_instances
    stage_id: step_00_2_us_person
    nist_800_171_rev2: ["3.1.1", "3.1.2", "3.5.1"]
    cmmc_level_2: ["AC.L2-3.1.1", "IA.L2-3.5.1"]
    coverage: partial
    assessor_notes: "Reachability only; review IDC configuration, MFA, and lifecycle in console/docs."

  - id: expected_idc_instance
    stage_id: step_00_2_us_person
    nist_800_171_rev2: ["3.1.1"]
    cmmc_level_2: ["AC.L2-3.1.1"]
    coverage: configuration
    assessor_notes: "Instance id drift; not a substitute for access review evidence."

