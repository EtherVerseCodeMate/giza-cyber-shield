# Application overview
description: |
  ADINKHEPRA Protocol (Agentic Security Attestation Framework) with Sekhem Triad (TRL10)
  
  A post-quantum cryptographic security platform designed for DoD, IC, and CMMC-compliant environments
  with autonomous security operations powered by the Sekhem Triad framework.

  Core Capabilities:
  - Post-quantum cryptography (CRYSTALS-Dilithium3, CRYSTALS-Kyber1024, Khepra-PQC)
  - Sekhem Triad: TRL10 autonomous framework (Hierarchical Multi-Agent Dynamic System)
  - Maat Guardian: AI-powered autonomous decision-making with tradeoff analysis
  - Ouroboros Cycle: Eternal feedback loop (10-second iterations)
  - Seshat Chronicle: Immutable DAG attestation with PQC signatures
  - KASA Engine: Autonomous security operations and threat hunting
  - Air-gapped deployment with zero external dependencies
  - Automated compliance attestation and evidence generation
  - Automated remediation with Augean Failsafe protection
  - Zero-trust architecture with hardware-bound licensing
  - Supply chain security verification (SBOM, signatures)
  - Device fingerprinting for anti-spoofing and license enforcement
  - CVE vulnerability scanning with local database
  - STIG/CIS/NIST compliance checking
  - Threat detection (rootkits, malware, anomalies)
  - DAG-based attack path visualization

  Sekhem Triad Framework (TRL10):
  - Duat Realm: Distributed defense layer (Edge Mode)
  - Aaru Realm: Intermediate coordination layer (Hybrid Mode)
  - Aten Realm: Centralized orchestration layer (Sovereign/Iron Bank Mode)
  - Wedjat Eyes: 4 sensors (STIG, Vulnerability, Drift, FIM)
  - Khopesh Blades: 5 actuators (Remediation, Firewall, Isolation, Monitor, Config)
  - Anubis Weighing: Tradeoff analysis (operational burden vs security benefit)
  - Autonomous Execution: Auto-execute safe actions (certainty >= 80%, burden <= 30%)

  Components:
  - sonar: Security scanner with device fingerprinting and CVE detection
  - adinkhepra: Main CLI for encryption, signing, integrity monitoring
  - khepra-daemon: Continuous monitoring agent with Ouroboros Cycle
  - gateway: API server for remote management
  - agent: Autonomous security monitoring agent with Sekhem Triad

# Build configuration
build_args:
  VERSION: "1.0.0"
  BUILD_DATE: "2026-01-20"
  MAINTAINER: "NouchiX SecRed Knowledge Inc."
  GO_VERSION: "1.23"

# Runtime dependencies
dependencies:
  golang:
    version: "1.23"
    package_manager: "go mod"
  system:
    - ca-certificates
    - tzdata

# Health check configuration
healthcheck:
  enabled: true
  interval: 30s
  timeout: 10s
  retries: 3
  command: ["/usr/local/bin/sonar", "--help"]

# Port exposure (documentation only - not opened by default)
exposed_ports:
  - 8443/tcp  # HTTPS API (gateway)

# Security hardening notes
hardening_notes: |
  Security Hardening Applied:
  - All binaries built with CGO_ENABLED=0 for static linking
  - Runs as non-root user (UID 1001, GID 0 for OpenShift)
  - No setuid/setgid binaries in final image
  - Minimal attack surface: no shell, no package manager in runtime
  - Post-quantum cryptography (CRYSTALS-Dilithium3, Kyber1024, Khepra-PQC)
  - ECDSA P-384 and ECIES for classical crypto fallback
  - AES-256-GCM for symmetric encryption
  - License enforcement prevents unauthorized usage
  - Hardware fingerprinting (TPM, MAC, CPU, BIOS) for node binding
  - Constant-time cryptographic operations (timing attack mitigation)
  - OWASP Top 100 protection (input validation, buffer overflow prevention)
  - Secure memory zeroization for key material
  - FIPS 140-2 compatible (classical algos, PQC non-FIPS aware)
  - Vendored dependencies (no network calls during build)
  - Multi-architecture support (AMD64, ARM64)

  CMMC/NIST Compliance Features:
  - Device fingerprinting for AC.3.018 (audit records)
  - PQC signatures for SC.3.177 (cryptographic protection)
  - CVE scanning for SI.3.216 (threat monitoring)
  - SBOM generation for SR.3.227 (supply chain)
  - Compliance checking for CA.3.161 (security assessments)
  - Automated operational remediation for IR.3.012 (incident response)

# Notes for reviewers
reviewer_notes: |
  The KHEPRA Protocol uses proprietary post-quantum algorithms (Khepra-PQC) in
  addition to NIST-standardized PQC (Dilithium3, Kyber1024). The proprietary
  algorithms are defensive-in-depth and do not replace NIST standards.

  All three signature layers must verify for a signature to be considered valid:
  1. Khepra-PQC (256-bit lattice, proprietary)
  2. CRYSTALS-Dilithium3 (NIST Level 3)
  3. ECDSA P-384 (FIPS 186-4 approved, classical fallback)

  This multi-layer approach ensures quantum resistance while maintaining
  compatibility with existing PKI infrastructure.

  Air-gapped deployment model:
  - All dependencies vendored via `go mod vendor`
  - No external network calls during build or runtime (offline mode)
  - Local CVE database (no internet lookups)
  - License files delivered via secure courier (encrypted USB)
  - Updates delivered as signed OCI bundles via sneakernet

  Tailscale Dependency (Dual-Mode Architecture):
  - KHEPRA includes Tailscale (WireGuard mesh) for OPTIONAL centralized reporting
  - Dormant by Default: Code is inert without TAILSCALE_AUTH_KEY environment variable
  - Ephemeral Nodes: No persistent state, nodes vanish on exit (Ephemeral: true)
  - Encrypted Transport: Chacha20-Poly1305 (IETF RFC 8439) + mutual authentication
  - NAT Traversal: Works from inside firewalls without opening inbound ports
  - Air-Gap Compliance: Binary runs 100% offline in default configuration (verified via tcpdump)
  - Use Cases: Air-gapped (SCIF) = offline mode; Networked (NIPRNet) = optional secure mesh
  - Competitive Advantage: Only scanner supporting air-gap AND distributed mesh (vs Tenable/Rapid7)
  - Technical Proof: pkg/net/tailnet/client.go:20-24 shows explicit runtime gate

  Compliance Mapping Library (Strategic Asset):
  - 36,195+ rows of proprietary cross-framework compliance mappings
  - Complete STIG→CCI→NIST 800-53→NIST 800-171→CMMC translation (automatic)
  - Data files: CCI_to_NIST53.csv (7,433 rows), STIG_CCI_Map.csv (28,639 rows), NIST53_to_171.csv (123 rows), NIST53_to_172.csv (CMMC 3.0 L3)
  - Competitive moat: 24-36 month lead (no competitor has automated multi-framework translation)
  - Value proposition: Single scan generates evidence for RMF, FedRAMP, CMMC, and STIG simultaneously
  - Labor savings: Replaces 40-hour manual mapping process with 15-minute automated translation
  - Additional revenue stream: $15.44M projected (compliance translation as a service)

  STIGViewer Integration:
  - Partnership with STIGViewer (100K+ DoD users) validates market need
  - KHEPRA transforms STIGViewer into multi-framework compliance platform
  - .CKL files include automatic CCI, NIST 800-53, NIST 800-171, and CMMC cross-references
  - Customer Advisory Board seat provides direct line to DISA requirements
  - Co-authoring "Cryptographic STIG" framework for PQC compliance
  - Dual-mode architecture enables centralized dashboards without violating air-gap requirements
