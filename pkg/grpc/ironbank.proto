syntax = "proto3";

package khepra.ironbank.grpc;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/EtherVerseCodeMate/giza-cyber-shield/pkg/grpc;pb";
option java_package = "com.khepra.ironbank.grpc";
option java_outer_classname = "IronBankProto";

// ============================================================================
// IronBank Security Scanning Service (gRPC Bridge)
// ============================================================================
// Replaces insecure subprocess calls with authenticated gRPC RPC model.
// Supports container scanning, vulnerability detection, compliance validation.
// ============================================================================

// ScanRequest initiates a security scan against a container/artifact.
message ScanRequest {
  string target_uri = 1;           // Container image URI (e.g., ironbank.dso.mil/app:v1.0)
  string scan_type = 2;            // VULN, MALWARE, COMPLIANCE, SBOM, ARTIFACT
  bool deep_inspection = 3;        // Enable layer-by-layer analysis
  repeated string frameworks = 4;  // STIG, NIST-800-171, CIS, etc.
  map<string, string> metadata = 5; // Custom scanner hints
}

// ScanResponse returns scan results with findings.
message ScanResponse {
  string scan_id = 1;
  google.protobuf.Timestamp started_at = 2;
  google.protobuf.Timestamp completed_at = 3;
  ScanStatus status = 4;
  int32 vulnerability_count = 5;
  int32 critical_count = 6;
  int32 high_count = 7;
  int32 medium_count = 8;
  int32 low_count = 9;
  repeated Finding findings = 10;
  ComplianceResult compliance = 11;
  SBOM sbom = 12;
  string raw_report = 13;          // Full scanner output (JSON/XML)
}

enum ScanStatus {
  SCAN_STATUS_UNSPECIFIED = 0;
  SCAN_STATUS_PENDING = 1;
  SCAN_STATUS_RUNNING = 2;
  SCAN_STATUS_COMPLETED = 3;
  SCAN_STATUS_FAILED = 4;
  SCAN_STATUS_TIMEOUT = 5;
}

// Finding represents a security issue.
message Finding {
  string id = 1;
  string title = 2;
  string description = 3;
  Severity severity = 4;
  string cve = 5;               // CVE ID if applicable
  string cwe = 6;               // CWE ID if applicable
  string component = 7;         // Package/binary containing the vulnerability
  string version = 8;           // Affected version
  string fixed_version = 9;     // Available patch version
  repeated string evidence = 10; // Proof data
  string remediation = 11;
  repeated string references = 12;
}

enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_CRITICAL = 1;
  SEVERITY_HIGH = 2;
  SEVERITY_MEDIUM = 3;
  SEVERITY_LOW = 4;
  SEVERITY_INFO = 5;
}

// ComplianceResult maps findings to compliance frameworks.
message ComplianceResult {
  string framework = 1;            // STIG, NIST-800-171, CIS, etc.
  repeated ComplianceGap gaps = 2;
  int32 pass_count = 3;
  int32 fail_count = 4;
  int32 unknown_count = 5;
}

// ComplianceGap represents a control failure.
message ComplianceGap {
  string control_id = 1;         // e.g., "AC-2", "SV-257023r867622_rule"
  string title = 2;
  string severity = 3;           // HIGH, MEDIUM, LOW
  string description = 4;
  string remediation = 5;
  repeated string evidence = 6;
}

// SBOM (Software Bill of Materials) in CYCLONEDX format.
message SBOM {
  string format = 1;             // "cyclonedx-json", "spdx-json"
  string version = 2;
  repeated Component components = 3;
}

// Component represents a software component in SBOM.
message Component {
  string name = 1;
  string version = 2;
  string type = 3;               // "library", "framework", "application", "os"
  string purl = 4;               // Package URL identifier
  string cpe = 5;                // Common Platform Enumeration
  repeated string vulnerabilities = 6; // Associated CVE IDs
  string license = 7;
}

// ============================================================================
// IronBank Scanner Service RPC Definition
// ============================================================================

service IronBankScanner {
  // Scan initiates an asynchronous scan and returns immediately with scan_id.
  rpc Scan(ScanRequest) returns (ScanResponse) {}
  
  // GetScanStatus retrieves the current status of a scan.
  rpc GetScanStatus(ScanStatusRequest) returns (ScanStatusResponse) {}
  
  // GetScanResult retrieves completed scan findings.
  rpc GetScanResult(ScanResultRequest) returns (ScanResponse) {}
  
  // ValidateCompliance checks artifact against specific framework.
  rpc ValidateCompliance(ComplianceRequest) returns (ComplianceResult) {}
  
  // GetSBOM retrieves component inventory.
  rpc GetSBOM(SBOMRequest) returns (SBOM) {}
  
  // BatchScan scans multiple artifacts efficiently.
  rpc BatchScan(BatchScanRequest) returns (stream BatchScanResponse) {}
}

message ScanStatusRequest {
  string scan_id = 1;
}

message ScanStatusResponse {
  string scan_id = 1;
  ScanStatus status = 2;
  google.protobuf.Timestamp updated_at = 3;
  float progress_percent = 4;
}

message ScanResultRequest {
  string scan_id = 1;
  bool include_raw = 2;
}

message ComplianceRequest {
  string target_uri = 1;
  repeated string frameworks = 2;
}

message SBOMRequest {
  string target_uri = 1;
  string format = 2;             // "cyclonedx-json", "spdx-json"
}

message BatchScanRequest {
  repeated ScanRequest requests = 1;
}

message BatchScanResponse {
  string target_uri = 1;
  ScanResponse result = 2;
}

// ============================================================================
// Authentication & Secure Communication
// ============================================================================

// ClientCredentials for mTLS and JWT authentication.
message ClientCredentials {
  string client_id = 1;
  string client_secret = 2;      // For OAuth2 client_credentials flow
  string cert_path = 3;          // Path to mTLS certificate
  string key_path = 4;           // Path to mTLS private key
  string ca_cert_path = 5;       // IronBank root CA certificate
}

// IronBank DoD-compliant header info.
message IronBankContext {
  string registry_url = 1;       // ironbank.dso.mil
  string api_version = 2;        // v1, v2, etc.
  string scan_engine = 3;        // aqua, anchore, grype, etc.
  bool fips_enforced = 4;        // Require FIPS 140-2 compliance
  bool air_gapped = 5;           // Scan in isolated environment
}
