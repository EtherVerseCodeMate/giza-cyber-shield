AWSTemplateFormatVersion: '2010-09-09'
Description: 'GitHub App Token Generator Lambda for KHEPRA Protocol CI/CD'

Parameters:
  ProjectName:
    Type: String
    Default: khepra-protocol
    Description: Name of the project
  Environment:
    Type: String
    Default: production
    Description: Environment name
  GitHubAppSecretName:
    Type: String
    Description: Name of the secret in Secrets Manager containing GitHub App credentials
    # Secret JSON example:
    # {
    #   "appId": "123456",
    #   "installationId": "987654321",
    #   "privateKey": "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n"
    # }

Resources:
  GitHubAppTokenLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-github-app-token-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GitHubAppSecretName}*'

  GitHubAppTokenLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-github-app-token-generator'
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt GitHubAppTokenLambdaRole.Arn
      Timeout: 30
      Environment:
        Variables:
          GITHUB_APP_SECRET_NAME: !Ref GitHubAppSecretName
      Code:
        ZipFile: |
          const https = require('https');
          const crypto = require('crypto');
          const SecretsManager = require('aws-sdk/clients/secretsmanager'); // v2 SDK is available in the runtime
          const sm = new SecretsManager({ region: process.env.AWS_REGION });

          const b64url = (buf) => Buffer.from(buf).toString('base64')
            .replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');

          function signJwtRS256(payload, privateKeyPEM) {
            const header = { alg: 'RS256', typ: 'JWT' };
            const part1 = b64url(JSON.stringify(header));
            const part2 = b64url(JSON.stringify(payload));
            const data = `${part1}.${part2}`;
            const signer = crypto.createSign('RSA-SHA256');
            signer.update(data);
            const signature = signer.sign(privateKeyPEM);
            return `${data}.${b64url(signature)}`;
          }

          function getInstallationToken(jwtToken, installationId) {
            return new Promise((resolve, reject) => {
              const req = https.request({
                hostname: 'api.github.com',
                port: 443,
                path: `/app/installations/${installationId}/access_tokens`,
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${jwtToken}`,
                  'Accept': 'application/vnd.github+json',
                  'User-Agent': 'KHEPRA-Protocol-CI-CD',
                  'Content-Length': '0'
                }
              }, res => {
                let body = '';
                res.on('data', c => body += c);
                res.on('end', () => {
                  if (res.statusCode === 201) {
                    const parsed = JSON.parse(body || '{}');
                    resolve({ token: parsed.token, expires_at: parsed.expires_at });
                  } else {
                    reject(new Error(`GitHub ${res.statusCode}: ${body}`));
                  }
                });
              });
              req.on('error', reject);
              req.end();
            });
          }

          exports.handler = async () => {
            try {
              const sec = await sm.getSecretValue({ SecretId: process.env.GITHUB_APP_SECRET_NAME }).promise();
              const { appId, installationId, privateKey } = JSON.parse(sec.SecretString);

              const now = Math.floor(Date.now()/1000);
              const jwt = signJwtRS256({ iat: now - 60, exp: now + 600, iss: appId }, privateKey);

              const { token, expires_at } = await getInstallationToken(jwt, installationId);
              return { statusCode: 200, body: JSON.stringify({ token, expires_at }) };
            } catch (err) {
              console.error('Error generating GitHub App token:', err);
              return { statusCode: 500, body: JSON.stringify({ error: err.message }) };
            }
          };

Outputs:
  GitHubAppTokenLambdaArn:
    Description: 'ARN of the GitHub App token generation Lambda function'
    Value: !GetAtt GitHubAppTokenLambda.Arn
    Export:
      Name: !Sub '${ProjectName}-github-app-token-lambda-arn'

  GitHubAppTokenLambdaName:
    Description: 'Name of the GitHub App token generation Lambda function'
    Value: !Ref GitHubAppTokenLambda
    Export:
      Name: !Sub '${ProjectName}-github-app-token-lambda-name'