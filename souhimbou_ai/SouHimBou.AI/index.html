  <script>
    // Cache prevention for all environments
    const timestamp = Date.now();
    document.querySelector('meta[name="cache-buster"]').content = timestamp;
    document.querySelector('meta[http-equiv="Last-Modified"]').content = new Date().toUTCString();
    document.querySelector('meta[name="version"]').content = 'v' + timestamp;

    // Add cache-busting to all script and link tags
    document.addEventListener('DOMContentLoaded', function () {
      const scripts = document.querySelectorAll('script[src]');
      const links = document.querySelectorAll('link[href]');

      scripts.forEach(script => {
        if (script.src && !script.src.includes('_cb=')) {
          script.src += (script.src.includes('?') ? '&' : '?') + '_cb=' + timestamp;
        }
      });

      links.forEach(link => {
        if (link.href && !link.href.includes('_cb=')) {
          link.href += (link.href.includes('?') ? '&' : '?') + '_cb=' + timestamp;
        }
      });
    });
  </script>
